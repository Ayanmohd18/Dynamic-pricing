version: "3.9"
services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  
  api:
    build: 
      context: .
      target: api
    ports: ["8000:8000"]
    depends_on: [redis]
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - REDIS_URL=redis://redis:6379
  
  dashboard:
    build:
      context: .
      target: dashboard
    ports: ["8501:8501"]
    depends_on: [api]
    environment:
      - API_BASE_URL=http://api:8000
